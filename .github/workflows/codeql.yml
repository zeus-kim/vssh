name: CodeQL
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 7 * * 1"
permissions:
  contents: read
  security-events: write

env:
  GOPATH: /tmp/vssh-go
  GOMODCACHE: /tmp/vssh-go/pkg/mod
  GOCACHE: /tmp/vssh-go/build-cache

jobs:
  analyze:
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: [self-hosted, Linux, X64, docker, go-ci]
    steps:
      - uses: actions/checkout@v4
      # autobuild shells out to `go`, so the toolchain must be on PATH before
      # CodeQL starts tracing. Without this the job depends on whichever
      # self-hosted runner it lands on having a system Go — it fails on the ones
      # that don't. Same go-version-file the other workflows use.
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: github/codeql-action/init@v3
        with:
          languages: go
      - uses: github/codeql-action/autobuild@v3
      - uses: github/codeql-action/analyze@v3
