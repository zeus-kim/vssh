name: CodeQL
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 7 * * 1"
permissions:
  contents: read
  security-events: write

jobs:
  analyze:
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
    # GitHub-hosted: consistent RAM/toolchain. The self-hosted runner's memory
    # auto-detect fed CodeQL bad values ("Invalid RAM setting -69", then
    # "Evaluator heap must be at least 384 MiB"); a public repo gets hosted
    # minutes free, so just run the analysis somewhere with sane memory.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: github/codeql-action/init@v3
        with:
          languages: go
      - uses: github/codeql-action/autobuild@v3
      - uses: github/codeql-action/analyze@v3
