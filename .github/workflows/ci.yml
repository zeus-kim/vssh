name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Vet
        run: go vet ./...

      - name: Build
        run: go build ./...

      - name: Test
        run: go test ./...

      - name: Shell script syntax
        shell: bash
        run: |
          while IFS= read -r f; do
            [[ -z "$f" ]] && continue
            bash -n "$f"
          done < <(git ls-files '*.sh')
